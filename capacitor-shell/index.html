<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Rajlo Driver</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f10100;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        color: #ffffff;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 24px;
      }
      .logo {
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -0.04em;
        margin-bottom: 24px;
      }
      .logo .o {
        color: #111906;
      }
      .msg {
        font-size: 15px;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }
      .spinner {
        margin-top: 24px;
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!--
      Bundled offline-fallback shown only when the native shell fails
      to reach the live driver portal. Should be rare — but a clean
      screen beats a blank white WebView. The app retries automatically
      once the device regains a network.
    -->
    <div class="wrap">
      <div class="logo">Rajl<span class="o">o</span> Driver</div>
      <p class="msg">
        Connecting to Rajlo&hellip;<br />
        <small style="opacity: 0.75; margin-top: 8px; display: block">
          If this screen sticks for more than a few seconds, check that
          your phone is online and try restarting the app.
        </small>
      </p>
      <div class="spinner"></div>
    </div>
  </body>
</html>
